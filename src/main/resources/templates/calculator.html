<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 5px;
            text-align: center;
        }
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .keypad-btn {
            padding: 15px;
            font-size: 1.2rem;
            background-color: #e9ecef;
            border: 1px solid #ced4da;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            user-select: none;
        }
        .keypad-btn:hover {
            background-color: #dee2e6;
        }
        .keypad-btn:active {
            background-color: #ced4da;
        }
        .keypad-btn.special {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
        .keypad-btn.special:hover {
            background-color: #f1b0b7;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Simple Calculator</h2>
    <form action="/calculate" method="post">
        <div class="form-group">
            <label for="num1">Number 1:</label>
            <input type="number" id="num1" name="num1" th:value="${num1}" required>
        </div>
        <div class="form-group">
            <label for="num2">Number 2:</label>
            <input type="number" id="num2" name="num2" th:value="${num2}" required>
        </div>
        <div class="form-group">
            <label for="operation">Operation:</label>
            <select id="operation" name="operation" style="width: 100%; padding: 8px;">
                <option value="add" th:selected="${operation == 'add'}">Add (+)</option>
                <option value="subtract" th:selected="${operation == 'subtract'}">Subtract (-)</option>
                <option value="multiply" th:selected="${operation == 'multiply'}">Multiply (*)</option>
                <option value="divide" th:selected="${operation == 'divide'}">Divide (/)</option>
            </select>
        </div>
        <button type="submit">Calculate</button>
    </form>

    <div th:if="${error != null}" class="result" style="color: red; background-color: #ffe6e6; border: 1px solid red;">
        <h3 th:text="${error}">Error Message</h3>
    </div>

    <div th:if="${result != null}" class="result">
        <h3>Result: <span th:text="${num1} + ' ' + ${symbol} + ' ' + ${num2} + ' = ' + ${result}"></span></h3>
    </div>

    <div class="keypad">
        <div class="keypad-btn" onclick="appendNumber('1')">1</div>
        <div class="keypad-btn" onclick="appendNumber('2')">2</div>
        <div class="keypad-btn" onclick="appendNumber('3')">3</div>
        <div class="keypad-btn" onclick="appendNumber('4')">4</div>
        <div class="keypad-btn" onclick="appendNumber('5')">5</div>
        <div class="keypad-btn" onclick="appendNumber('6')">6</div>
        <div class="keypad-btn" onclick="appendNumber('7')">7</div>
        <div class="keypad-btn" onclick="appendNumber('8')">8</div>
        <div class="keypad-btn" onclick="appendNumber('9')">9</div>
        <div class="keypad-btn special" onclick="clearInput()">C</div>
        <div class="keypad-btn" onclick="appendNumber('0')">0</div>
        <div class="keypad-btn special" onclick="backspace()">←</div>
    </div>
</div>

<script>
    let activeInput = document.getElementById('num1');

    document.getElementById('num1').addEventListener('focus', function() {
        activeInput = this;
    });

    document.getElementById('num2').addEventListener('focus', function() {
        activeInput = this;
    });

    function appendNumber(num) {
        activeInput.value = activeInput.value + num;
        activeInput.focus();
    }

    function clearInput() {
        activeInput.value = '';
        activeInput.focus();
    }

    function backspace() {
        activeInput.value = activeInput.value.slice(0, -1);
        activeInput.focus();
    }
</script>

</body>
</html>
