<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 5px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Simple Calculator</h2>
    <form action="/calculate" method="post">
        <div class="form-group">
            <label for="num1">Number 1:</label>
            <input type="number" id="num1" name="num1" th:value="${num1}" required>
        </div>
        <div class="form-group">
            <label for="num2">Number 2:</label>
            <input type="number" id="num2" name="num2" th:value="${num2}" required>
        </div>
        <div class="form-group">
            <label for="operation">Operation:</label>
            <select id="operation" name="operation" style="width: 100%; padding: 8px;">
                <option value="add" th:selected="${operation == 'add'}">Add (+)</option>
                <option value="subtract" th:selected="${operation == 'subtract'}">Subtract (-)</option>
                <option value="multiply" th:selected="${operation == 'multiply'}">Multiply (*)</option>
            </select>
        </div>
        <button type="submit">Calculate</button>
    </form>

    <div th:if="${result != null}" class="result">
        <h3>Result: <span th:text="${num1} + ' ' + ${symbol} + ' ' + ${num2} + ' = ' + ${result}"></span></h3>
    </div>
</div>

</body>
</html>
